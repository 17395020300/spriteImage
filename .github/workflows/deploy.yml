name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 可在 Actions 里手动 Run workflow，便于切换 Pages 源后重试部署

# 若上传/部署失败：仓库 Settings → Actions → General → Workflow permissions 选「Read and write permissions」
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Ensure dist is production bundle (not dev index.html)
        run: |
          if grep -q 'src/main.ts' dist/index.html; then
            echo 'dist/index.html still references /src/main.ts — build output is wrong.'
            exit 1
          fi
          if ! grep -qE 'assets/index-.*\.js' dist/index.html; then
            echo 'dist/index.html has no hashed assets/*.js entry.'
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Debug dist on failure
        if: failure()
        run: |
          echo "--- dist/index.html ---"
          cat dist/index.html 2>/dev/null || true
          echo "--- dist ---"
          ls -la dist 2>/dev/null || true
